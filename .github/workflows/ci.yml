name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Syntax check
        run: |
          python -m compileall src tests _imports_ create_presentation.py main.py setup.py

      - name: Type check
        run: |
          python -m mypy src

      - name: Run tests
        run: |
          python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=90
